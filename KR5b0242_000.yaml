body:
  text: 青玄救苦寳懴慈尊昇度寳懴青玄救苦寳懴起敬讃三皈依敷坐讃具法位臣某恭謹焚香䖍誠奏啓至真無上道寳太上三尊至真無上經寳三十六部尊經至真無上師寳玄中大法師黄籙大道師尋聲赴感太一救苦天尊大慈大悲救苦真人大慈大悲大惠真人東極宫中長樂境内左右侍衛無鞅真仙聖衆悉仗真香普同供養入意伏以青華長樂界本無聲無色之天東極妙嚴官有大慈大悲之父徧十方而救苦歷浩劫以度人廣開懴悔之門大啓昇遷之路幽明仰賴凡聖皈依苟運念以懇祈悉隨聲而赴感今齋主追薦亡殁崇建齋修禮九九之拜以望塵陳一一之誠而首過伏願至仁從欲上德好生削右府之黒書永銷釁咎授東華之青簡亟遂超淩稽首皈依無極大道舉按人各恭敬至心皈命禮玉清聖境清微天宫鬱羅蕭臺之中森羅淨霐之上現有爲之梵相具無極之神通敷演真玄破無有色空之礙拯提趣類絶智愚髙下之分妙用難窺靈機罔測大悲大願大聖大慈無量度人元始天尊至心皈命禮上清真境禹餘天宫紫微瓊臺之中玄都玉京之上接元始虚皇之統系超西那玉國之根苖入黍米珠盡挹真玄之精粹在香林苑屢談祕要之筌蹄妙德難思神通莫測大悲大願大聖大慈無量度人靈寳天尊至心皈命禮太清仙境太赤天宫巍巍金闕之髙渺渺重霄之上降生於無量數劫說法於萬二千天五千祕言融三才之妙道八十餘度接六趣之衆生聖德崇髙玄功廣博大悲大願大聖大慈無量度人道德天尊至心皈命禮青華聖境東極上宫十方化號度衆生百億瑞光瞻妙相即隨機而赴感由誓願之弘深九色蓮花作慈航之彼岸一枝楊柳開甘露之法門無量度人大慈仁者大悲大願大聖大慈太一尋聲救苦天尊臣衆等至心皈身皈神皈命慈尊投誠上聖重念亡過某靈䰟爰從生育乃至淪亡不孝積愆未伸懴悔或逆父母而欺天理罪莫大焉或犯姑嫜而廢彞倫是謂過矣失尊卑背忘親義得富貴違負師恩禮貌敬讓之有虧衣食奉養之不給如斯罪咎無量無邊今對道前䖍心首謝恭願頒行符命拯濟亡䰟地獄無苦聲息風雷之震怒天堂享大福昇霄漢之髙虚法衆皈依至心朝禮至心朝禮妙道真身太一救苦天尊至心朝禮紫金瑞相太一救苦天尊至心朝禮隨機赴感太一救苦天尊至心朝禮誓願無邊太一救苦天尊至心朝禮大聖大慈太一救苦天尊至心朝禮大悲大願太一救苦天尊至心朝禮十方化號太一救苦天尊至心朝禮普度衆生太一救苦天尊至心朝禮尋聲赴感太一救苦天尊臣衆等至心皈身皈神皈命慈尊投誠上聖重念亡過某靈䰟爰從生育乃至淪亡不忠積愆未伸懴悔或荷厚禄而不思補報持節尤難或居賤役而罔效勤勞偷安是務臨患難不能一死觀勝負常懷二心緘口結舌而避嫌疑欺衷矯情以邀聲譽如斯罪咎無量無邊今對道前䖍心首謝恭願頒行符命拯濟亡䰟地獄無苦聲免銅柱炙身之焦爛天堂享大福登瑶臺縱歩以逍遥法衆皈依至心朝禮至心朝禮妙道真身太一救苦天尊至心朝禮紫金瑞相太一救苦天尊至心朝禮隨機赴感太一救苦天尊至心朝禮誓願無邊太一救苦天尊至心朝禮大聖大慈太一救苦天尊至心朝禮大悲大願太一救苦天尊至心朝禮十方化號太一救苦天尊至心朝禮普度衆生太一救苦天尊至心朝禮尋聲赴感太一救苦天尊臣衆等至心皈身皈神皈命慈尊投誠上聖重念亡過某靈䰟爰從生育乃至淪亡殺害積愆未伸懴悔或見死而不興慈救如己殺之或用心而故欲殺之非天數也含怨尤適從其便受賄賂枉入其愆擠之溺逼之縊忍爲不仁食其肉寢其皮恬不知𢡖如斯罪咎無量無邊今對道前䖍心首謝恭願頒行符命拯濟亡䰟地獄無苦聲脫火翳焦勞之難天堂享大福樂煙霞清淨之居法衆皈依至心朝禮至心朝禮妙道真身太一救苦天尊至心朝禮紫金瑞相太一救苦天尊至心朝禮隨機赴感太一救苦天尊至心朝禮誓願無邊太一救苦天尊至心朝禮大聖大慈太一救苦天尊至心朝禮大悲大願太一救苦天尊至心朝禮十方化號太一救苦天尊至心朝禮普度衆生太一救苦天尊至心朝禮尋聲赴感太一救苦天尊臣衆等至心皈身皈神皈命慈尊投誠上聖重念亡過某靈䰟爰從生育乃至淪亡婬欲積愆未伸懴悔或見姿色而妄生邪念喪失本真或犯骨肉而不能正身夷淩風化唱艷曲淫詞而亂人之性爲冶容謔語而挑彼之情荒唐致敗國以亡家泛濫乃墮胎而損子如斯罪咎無量無邊今對道前䖍心首謝恭願頒行符命拯濟亡䰟地獄無苦聲止屠割辛酸之痛天堂享大福得逍遥宴樂之娱稽首皈依至心朝禮至心朝禮妙道真身太一救苦天尊至心朝禮紫金瑞相太一救苦天尊至心朝禮隨機赴感太一救苦天尊至心朝禮誓願無邊太一救苦天尊至心朝禮大聖大慈太一救苦天尊至心朝禮大悲大願太一救苦天尊至心朝禮十方化號太一救苦天尊至心朝禮普度衆生太一救苦天尊至心朝禮尋聲赴感太一救苦天尊臣衆等至心皈身皈神皈命慈尊投誠上聖重念亡過某靈䰟爰從生育乃至淪亡偷盜積愆未伸懴悔或見利而不能推義致起偷心或欺公而恣於作非遂形敗迹明恃强而劫奪隂用計以侵攘瞞人耳目之不知捫巳腹心而有愧如斯罪咎無量無邊今對道前䖍心首謝恭願頒行符命拯濟亡䰟地獄無苦聲免鐵杖金槌之拷天堂享大福遂蓬壷閬苑之遊稽首皈依至心朝禮至心朝禮妙道真身太一救苦天尊至心朝禮紫金瑞相太一救苦天尊至心朝禮隨機赴感太一救苦天尊至心朝禮誓願無邊太一救苦天尊至心朝禮大聖大慈太一救苦天尊至心朝禮大悲大願太一救苦天尊至心朝禮十方化號太一救苦天尊至心朝禮普度衆生太一救苦天